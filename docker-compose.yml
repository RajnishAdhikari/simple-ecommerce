version: '3.8'

services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ecommerce_db
    ports:
      - "5432:5432"

  fastapi:
    image: tiangolo/uvicorn-gunicorn-fastapi:latest
    volumes:
      - ./app:/app
    ports:
      - "8000:80"
    depends_on:
      - db
